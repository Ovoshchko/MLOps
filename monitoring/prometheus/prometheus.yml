global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: triton
    static_configs:
      - targets:
          - host.docker.internal:8002

  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8010

  - job_name: kafka
    static_configs:
      - targets:
          - kafka-exporter:9308
