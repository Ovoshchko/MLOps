dataset:
  manifest_uri: s3://reddit-data/datasets/processed/reddit_technology_2025-03-01_2026-03-01_v1/manifest.json
  env_path: data_pipeline/.env

split:
  train_size: 0.7
  val_size: 0.15
  test_size: 0.15
  seed: 42
  shuffle: true

model:
  name: ridge
  alpha: 1.0

mlflow:
  tracking_uri: http://localhost:5001
  experiment_name: baseline
  run_name: ridge-baseline-v1
